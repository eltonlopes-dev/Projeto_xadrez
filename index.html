<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xadrez Mobile vs IA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        h1 { margin: 15px 0 5px 0; font-size: 1.4rem; }

        #status {
            margin-bottom: 15px;
            font-size: 0.9rem;
            color: #aaa;
            text-align: center;
            height: 1.2rem;
        }

        /* Container do Tabuleiro Responsivo */
        .board-wrapper {
            width: 100%;
            max-width: 450px;
            aspect-ratio: 1 / 1;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: 100%;
            height: 100%;
            border: 4px solid #333;
            user-select: none;
        }

        .square {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .white-square { background-color: #eeeed2; }
        .black-square { background-color: #769656; }

        .piece {
            font-size: 9vw; /* Tamanho fluido para mobile */
            position: absolute;
            pointer-events: none;
        }

        @media (min-width: 500px) {
            .piece { font-size: 45px; }
        }

        .piece.b { color: #000; }
        .piece.w { color: #fff; text-shadow: 0 0 3px #000; }

        /* Destaques de Toque */
        .square.selected { background-color: #bbc14d !important; }
        .square.valid-move::after {
            content: '';
            position: absolute;
            width: 25%;
            height: 25%;
            background-color: rgba(0, 0, 0, 0.15);
            border-radius: 50%;
        }

        .btn-reset {
            margin-top: 20px;
            padding: 10px 20px;
            background: #444;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Xadrez vs IA</h1>
    <div id="status">Carregando...</div>
    
    <div class="board-wrapper">
        <div id="board" class="board"></div>
    </div>

    <button class="btn-reset" onclick="resetGame()">Reiniciar Jogo</button>

    <script>
        const boardHtml = document.getElementById('board');
        const statusHtml = document.getElementById('status');
        let game = new Chess();
        let selectedSquare = null;

        const pieceUnicode = {
            'wk': '♚', 'wq': '♛', 'wr': '♜', 'wb': '♝', 'wn': '♞', 'wp': '♟',
            'bk': '♚', 'bq': '♛', 'br': '♜', 'bb': '♝', 'bn': '♞', 'bp': '♟'
        };

        function drawBoard() {
            boardHtml.innerHTML = '';
            const boardState = game.board();

            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const squareCoord = `${String.fromCharCode(97 + col)}${8 - row}`;
                    const squareInfo = boardState[row][col];
                    
                    const squareDiv = document.createElement('div');
                    squareDiv.className = `square ${(row + col) % 2 === 0 ? 'white-square' : 'black-square'}`;
                    
                    if (selectedSquare === squareCoord) squareDiv.classList.add('selected');
                    
                    if (selectedSquare) {
                        const moves = game.moves({ square: selectedSquare, verbose: true });
                        if (moves.some(m => m.to === squareCoord)) squareDiv.classList.add('valid-move');
                    }

                    squareDiv.onclick = () => handleSquareClick(squareCoord);

                    if (squareInfo) {
                        const span = document.createElement('span');
                        span.className = `piece ${squareInfo.color}`;
                        span.textContent = pieceUnicode[squareInfo.color + squareInfo.type];
                        squareDiv.appendChild(span);
                    }

                    boardHtml.appendChild(squareDiv);
                }
            }
            updateStatus();
        }

        function handleSquareClick(square) {
            if (game.game_over() || game.turn() === 'b') return;

            if (selectedSquare) {
                const move = game.move({ from: selectedSquare, to: square, promotion: 'q' });
                if (move) {
                    selectedSquare = null;
                    drawBoard();
                    if (!game.game_over()) {
                        statusHtml.textContent = "IA pensando...";
                        setTimeout(makeAiMove, 300);
                    }
                } else {
                    const piece = game.get(square);
                    if (piece && piece.color === 'w') {
                        selectedSquare = square;
                        drawBoard();
                    } else {
                        selectedSquare = null;
                        drawBoard();
                    }
                }
            } else {
                const piece = game.get(square);
                if (piece && piece.color === 'w') {
                    selectedSquare = square;
                    drawBoard();
                }
            }
        }

        /* --- LÓGICA DA IA (MINIMAX) --- */

        function makeAiMove() {
            const depth = 3; // Nível de dificuldade
            const move = minimaxRoot(depth, game, true);
            game.move(move);
            drawBoard();
        }

        const pieceValues = { 'p': 100, 'n': 320, 'b': 330, 'r': 500, 'q': 900, 'k': 20000 };

        function evaluateBoard(current_game) {
            let total = 0;
            current_game.board().forEach(row => {
                row.forEach(p => {
                    if (p) total += (p.color === 'b' ? pieceValues[p.type] : -pieceValues[p.type]);
                });
            });
            return total;
        }

        function minimaxRoot(depth, current_game, isMax) {
            let moves = current_game.moves();
            let bestValue = -Infinity;
            let bestMove = null;

            for (let m of moves) {
                current_game.move(m);
                let value = minimax(depth - 1, current_game, -Infinity, Infinity, !isMax);
                current_game.undo();
                if (value >= bestValue) {
                    bestValue = value;
                    bestMove = m;
                }
            }
            return bestMove;
        }

        function minimax(depth, current_game, alpha, beta, isMax) {
            if (depth === 0 || current_game.game_over()) return evaluateBoard(current_game);
            
            let moves = current_game.moves();
            if (isMax) {
                let best = -Infinity;
                for (let m of moves) {
                    current_game.move(m);
                    best = Math.max(best, minimax(depth - 1, current_game, alpha, beta, false));
                    current_game.undo();
                    alpha = Math.max(alpha, best);
                    if (beta <= alpha) break;
                }
                return best;
            } else {
                let best = Infinity;
                for (let m of moves) {
                    current_game.move(m);
                    best = Math.min(best, minimax(depth - 1, current_game, alpha, beta, true));
                    current_game.undo();
                    beta = Math.min(beta, best);
                    if (beta <= alpha) break;
                }
                return best;
            }
        }

        function updateStatus() {
            if (game.in_checkmate()) statusHtml.textContent = "Xeque-Mate!";
            else if (game.in_draw()) statusHtml.textContent = "Empate!";
            else statusHtml.textContent = game.turn() === 'w' ? "Sua vez (Brancas)" : "IA pensando...";
        }

        function resetGame() {
            game = new Chess();
            selectedSquare = null;
            drawBoard();
        }

        drawBoard();
    </script>
</body>
</html>
