<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xadrez Mobile</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    
    <style>
        /* ==========================================
           1. RESET E ESTILOS BÁSICOS
           ========================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* Remove o destaque azul ao tocar no Chrome/Safari mobile */
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #1a1a1a; /* Fundo mais escuro para contraste no celular */
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Começa do topo no celular */
            min-height: 100vh;
            padding: 10px;
        }

        h1 {
            margin: 10px 0 5px 0;
            font-size: 1.5rem; /* Fonte menor para o título */
        }

        #status {
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 1rem;
            color: #ccc;
            text-align: center;
            width: 100%;
        }

        /* ==========================================
           2. O TABULEIRO RESPONSIVO
           ========================================== */
        .board-wrapper {
            /* Container para centralizar o tabuleiro e garantir formato quadrado */
            width: 100%;
            max-width: 500px; /* Limite para telas grandes (tablets/desktops) */
            aspect-ratio: 1 / 1; /* Garante que o container seja sempre quadrado */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(8, 1fr); /* 8 colunas de tamanho igual */
            grid-template-rows: repeat(8, 1fr);    /* 8 linhas de tamanho igual */
            width: 100%;
            height: 100%;
            border: 3px solid #4a3121; /* Borda ligeiramente menor */
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            user-select: none; /* Impede seleção de texto */
        }

        /* ==========================================
           3. AS CASAS E PEÇAS
           ========================================== */
        .square {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            /* O tamanho da casa é definido automaticamente pelo Grid fr */
        }

        /* Cores do Tabuleiro */
        .white-square { background-color: #f0d9b5; color: black; }
        .black-square { background-color: #b58863; color: black; }

        .piece {
            /* Tamanho da peça relativo ao tamanho da casa (80% da casa) */
            font-size: 8vw; /* Unidade VW é chave para responsividade */
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Impede que o toque capture o span da peça em vez da div da casa */
            pointer-events: none; 
        }

        /* Ajuste fino para o tamanho da peça em telas maiores (tablets) */
        @media (min-width: 500px) {
            .piece {
                font-size: 40px; /* Tamanho fixo quando a tela é grande */
            }
        }

        /* Cores das Peças (Unicode) */
        .piece.b { color: #000; } /* Pretas são pretas */
        .piece.w { 
            color: #fff; 
            text-shadow: 0 0 3px #000; /* Contorno forte nas brancas */
        }

        /* ==========================================
           4. DESTAQUES E TOQUE
           ========================================== */
        
        /* Casa Selecionada (Toque) */
        .square.selected { 
            background-color: #6ac070 !important; /* Verde mais vibrante */
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
        }

        /* Ponto indicador de movimento válido */
        .square.valid-move::after {
            content: '';
            position: absolute;
            /* Tamanho relativo à casa */
            width: 30%; 
            height: 30%;
            background-color: rgba(0, 0, 0, 0.25);
            border-radius: 50%;
        }

        /* Remove efeitos de hover que não funcionam bem no toque */
        @media (hover: hover) {
            .square:hover:not(.selected) {
                background-color: rgba(106, 192, 112, 0.3);
            }
        }
    </style>
</head>
<body>

    <h1>Xadrez Mobile</h1>
    <div id="status">Sua vez (Brancas)</div>
    
    <div class="board-wrapper">
        <div id="board" class="board"></div>
    </div>

    <script>
        /* ==========================================
           LÓGICA DO JOGO (HTML/CSS GENERATOR)
           (Apenas Lógica Humano vs Humano Simples)
           ========================================== */
        const boardHtml = document.getElementById('board');
        const statusHtml = document.getElementById('status');
        
        const game = new Chess(); 
        let selectedSquare = null;

        const pieceUnicode = {
            'wk': '♚', 'wq': '♛', 'wr': '♜', 'wb': '♝', 'wn': '♞', 'wp': '♟',
            'bk': '♚', 'bq': '♛', 'br': '♜', 'bb': '♝', 'bn': '♞', 'bp': '♟'
        };

        function drawBoard() {
            boardHtml.innerHTML = '';
            const boardState = game.board();

            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const squareInfo = boardState[row][col];
                    const squareCoord = `${String.fromCharCode(97 + col)}${8 - row}`;
                    
                    const squareDiv = document.createElement('div');
                    squareDiv.className = `square ${(row + col) % 2 === 0 ? 'white-square' : 'black-square'}`;
                    squareDiv.dataset.square = squareCoord;
                    
                    // IMPORTANTE: Use onclick, que funciona bem no toque mobile
                    squareDiv.onclick = () => handleSquareClick(squareCoord);

                    if (squareInfo) {
                        const pieceSpan = document.createElement('span');
                        const pieceKey = `${squareInfo.color}${squareInfo.type}`;
                        pieceSpan.className = `piece ${squareInfo.color}`;
                        pieceSpan.textContent = pieceUnicode[pieceKey];
                        squareDiv.appendChild(pieceSpan);
                    }

                    if (selectedSquare === squareCoord) {
                        squareDiv.classList.add('selected');
                    }

                    if (selectedSquare) {
                        const moves = game.moves({ square: selectedSquare, verbose: true });
                        if (moves.some(move => move.to === squareCoord)) {
                            squareDiv.classList.add('valid-move');
                        }
                    }

                    boardHtml.appendChild(squareDiv);
                }
            }
            updateStatus();
        }

        function updateStatus() {
            let status = '';
            const moveColor = game.turn() === 'w' ? 'Brancas' : 'Pretas';

            if (game.in_checkmate()) {
                status = `FIM: ${moveColor} perderam (Xeque-Mate).`;
            } else if (game.in_draw()) {
                status = 'FIM: Empate.';
            } else {
                status = `Vez das ${moveColor}`;
                if (game.in_check()) { status += ' (Xeque!)'; }
            }
            statusHtml.textContent = status;
        }

        function handleSquareClick(square) {
            if (game.game_over()) return;

            if (selectedSquare) {
                const move = game.move({
                    from: selectedSquare,
                    to: square,
                    promotion: 'q'
                });

                if (move) {
                    selectedSquare = null;
                    drawBoard();
                } else {
                    const piece = game.get(square);
                    // Se clicar em outra peça da mesma cor, troca a seleção
                    if(piece && piece.color === game.turn()) {
                        selectedSquare = square;
                        drawBoard();
                    } else {
                        // Clique inválido limpa a seleção
                        selectedSquare = null;
                        drawBoard();
                    }
                }
            } else {
                const piece = game.get(square);
                // Primeira seleção (apenas se for a vez da cor correspondente)
                if (piece && piece.color === game.turn()) {
                    selectedSquare = square;
                    drawBoard();
                }
            }
        }

        drawBoard();
    </script>
</body>
</html>
